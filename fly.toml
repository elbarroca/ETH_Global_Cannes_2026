app = "vm-risk"
primary_region = "cdg"

[build]
  dockerfile = "fly/Dockerfile.agent"

[env]
  NODE_ENV = "production"
  AGENT_NAME = "risk"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
